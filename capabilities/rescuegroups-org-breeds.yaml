naftiko: 1.0.0-alpha2
info:
  label: RescueGroups.org API — Breeds
  description: 'RescueGroups.org API — Breeds. 1 operations. Lead operation: List Animal Breeds. Self-contained Naftiko capability
    covering one Rescuegroups Org business surface.'
  tags:
  - Rescuegroups Org
  - Breeds
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RESCUEGROUPS_ORG_API_KEY: RESCUEGROUPS_ORG_API_KEY
capability:
  consumes:
  - type: http
    namespace: rescuegroups-org-breeds
    baseUri: https://api.rescuegroups.org/v5
    description: RescueGroups.org API — Breeds business capability. Self-contained, no shared references.
    resources:
    - name: public-animals-breeds
      path: /public/animals/breeds
      operations:
      - name: listanimalbreeds
        method: GET
        description: List Animal Breeds
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.RESCUEGROUPS_ORG_API_KEY}}'
  exposes:
  - type: rest
    namespace: rescuegroups-org-breeds-rest
    port: 8080
    description: REST adapter for RescueGroups.org API — Breeds. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/public/animals/breeds
      name: public-animals-breeds
      description: REST surface for public-animals-breeds.
      operations:
      - method: GET
        name: listanimalbreeds
        description: List Animal Breeds
        call: rescuegroups-org-breeds.listanimalbreeds
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rescuegroups-org-breeds-mcp
    port: 9090
    transport: http
    description: MCP adapter for RescueGroups.org API — Breeds. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-animal-breeds
      description: List Animal Breeds
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rescuegroups-org-breeds.listanimalbreeds
      outputParameters:
      - type: object
        mapping: $.
