naftiko: 1.0.0-alpha2
info:
  label: RescueGroups.org API — Species
  description: 'RescueGroups.org API — Species. 1 operations. Lead operation: List Animal Species. Self-contained Naftiko
    capability covering one Rescuegroups Org business surface.'
  tags:
  - Rescuegroups Org
  - Species
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RESCUEGROUPS_ORG_API_KEY: RESCUEGROUPS_ORG_API_KEY
capability:
  consumes:
  - type: http
    namespace: rescuegroups-org-species
    baseUri: https://api.rescuegroups.org/v5
    description: RescueGroups.org API — Species business capability. Self-contained, no shared references.
    resources:
    - name: public-animals-species
      path: /public/animals/species
      operations:
      - name: listanimalspecies
        method: GET
        description: List Animal Species
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.RESCUEGROUPS_ORG_API_KEY}}'
  exposes:
  - type: rest
    namespace: rescuegroups-org-species-rest
    port: 8080
    description: REST adapter for RescueGroups.org API — Species. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/public/animals/species
      name: public-animals-species
      description: REST surface for public-animals-species.
      operations:
      - method: GET
        name: listanimalspecies
        description: List Animal Species
        call: rescuegroups-org-species.listanimalspecies
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rescuegroups-org-species-mcp
    port: 9090
    transport: http
    description: MCP adapter for RescueGroups.org API — Species. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-animal-species
      description: List Animal Species
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rescuegroups-org-species.listanimalspecies
      outputParameters:
      - type: object
        mapping: $.
