naftiko: 1.0.0-alpha2
info:
  label: RescueGroups.org API — Colors
  description: 'RescueGroups.org API — Colors. 1 operations. Lead operation: List Animal Colors. Self-contained Naftiko capability
    covering one Rescuegroups Org business surface.'
  tags:
  - Rescuegroups Org
  - Colors
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RESCUEGROUPS_ORG_API_KEY: RESCUEGROUPS_ORG_API_KEY
capability:
  consumes:
  - type: http
    namespace: rescuegroups-org-colors
    baseUri: https://api.rescuegroups.org/v5
    description: RescueGroups.org API — Colors business capability. Self-contained, no shared references.
    resources:
    - name: public-animals-colors
      path: /public/animals/colors
      operations:
      - name: listanimalcolors
        method: GET
        description: List Animal Colors
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.RESCUEGROUPS_ORG_API_KEY}}'
  exposes:
  - type: rest
    namespace: rescuegroups-org-colors-rest
    port: 8080
    description: REST adapter for RescueGroups.org API — Colors. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/public/animals/colors
      name: public-animals-colors
      description: REST surface for public-animals-colors.
      operations:
      - method: GET
        name: listanimalcolors
        description: List Animal Colors
        call: rescuegroups-org-colors.listanimalcolors
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rescuegroups-org-colors-mcp
    port: 9090
    transport: http
    description: MCP adapter for RescueGroups.org API — Colors. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-animal-colors
      description: List Animal Colors
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rescuegroups-org-colors.listanimalcolors
      outputParameters:
      - type: object
        mapping: $.
