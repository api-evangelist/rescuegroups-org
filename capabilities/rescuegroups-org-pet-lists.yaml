naftiko: 1.0.0-alpha2
info:
  label: RescueGroups.org API — Pet Lists
  description: 'RescueGroups.org API — Pet Lists. 2 operations. Lead operation: Get Pet List. Self-contained Naftiko capability
    covering one Rescuegroups Org business surface.'
  tags:
  - Rescuegroups Org
  - Pet Lists
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RESCUEGROUPS_ORG_API_KEY: RESCUEGROUPS_ORG_API_KEY
capability:
  consumes:
  - type: http
    namespace: rescuegroups-org-pet-lists
    baseUri: https://api.rescuegroups.org/v5
    description: RescueGroups.org API — Pet Lists business capability. Self-contained, no shared references.
    resources:
    - name: public-petlists-keystring
      path: /public/petlists/{keystring}
      operations:
      - name: getpetlist
        method: GET
        description: Get Pet List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: keystring
          in: path
          type: string
          description: The pet list keystring identifier.
          required: true
      - name: updatepetlist
        method: PUT
        description: Update Pet List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: keystring
          in: path
          type: string
          description: The pet list keystring identifier.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.RESCUEGROUPS_ORG_API_KEY}}'
  exposes:
  - type: rest
    namespace: rescuegroups-org-pet-lists-rest
    port: 8080
    description: REST adapter for RescueGroups.org API — Pet Lists. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/public/petlists/{keystring}
      name: public-petlists-keystring
      description: REST surface for public-petlists-keystring.
      operations:
      - method: GET
        name: getpetlist
        description: Get Pet List
        call: rescuegroups-org-pet-lists.getpetlist
        with:
          keystring: rest.keystring
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatepetlist
        description: Update Pet List
        call: rescuegroups-org-pet-lists.updatepetlist
        with:
          keystring: rest.keystring
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rescuegroups-org-pet-lists-mcp
    port: 9090
    transport: http
    description: MCP adapter for RescueGroups.org API — Pet Lists. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-pet-list
      description: Get Pet List
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rescuegroups-org-pet-lists.getpetlist
      with:
        keystring: tools.keystring
      outputParameters:
      - type: object
        mapping: $.
    - name: update-pet-list
      description: Update Pet List
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: rescuegroups-org-pet-lists.updatepetlist
      with:
        keystring: tools.keystring
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
