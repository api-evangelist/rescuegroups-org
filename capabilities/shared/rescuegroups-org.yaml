naftiko: "1.0.0-alpha1"

info:
  label: "RescueGroups.org API"
  description: >-
    The RescueGroups.org REST API v5 provides access to adoptable pet data
    including animals, organizations, breeds, species, colors, and patterns.
    Supports advanced search with geodistance filtering and JSON API responses.
  tags:
    - Animals
    - Pet Adoption
    - Rescue
    - Organizations
    - Animal Welfare
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      RESCUEGROUPS_API_KEY: RESCUEGROUPS_API_KEY

capability:
  consumes:
    - type: http
      namespace: rescuegroups
      baseUri: https://api.rescuegroups.org/v5
      description: "RescueGroups.org REST API v5 for adoptable pet data"
      authentication:
        type: apikey
        key: Authorization
        value: "{{RESCUEGROUPS_API_KEY}}"
        placement: header
      resources:
        - name: public-animals
          path: /public/animals
          description: "Public adoptable animal records"
          operations:
            - name: list-public-animals
              method: GET
              description: "Retrieve a paginated list of public adoptable animals"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number for paginated results"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of records per page (max 250)"
                - name: sort
                  in: query
                  type: string
                  required: false
                  description: "Sort field with +/- prefix"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-public-animal
              method: GET
              description: "Retrieve a single public adoptable animal by ID"
              inputParameters:
                - name: animal_id
                  in: path
                  type: string
                  required: true
                  description: "The unique animal identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: search-public-animals
              method: POST
              description: "Search public adoptable animals using filters, views, and geodistance"
              inputParameters:
                - name: view_name
                  in: path
                  type: string
                  required: true
                  description: "Predefined view name (e.g., available, cats, dogs)"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Records per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  data:
                    filters: "{{tools.filters}}"
                    geodistance: "{{tools.geodistance}}"

        - name: public-orgs
          path: /public/orgs
          description: "Public rescue organization records"
          operations:
            - name: list-public-orgs
              method: GET
              description: "Retrieve a paginated list of public rescue organizations"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Records per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-public-org
              method: GET
              description: "Retrieve a single public rescue organization by ID"
              inputParameters:
                - name: org_id
                  in: path
                  type: string
                  required: true
                  description: "The unique organization identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: reference-data
          path: /public/animals
          description: "Animal reference data (breeds, species, colors, patterns)"
          operations:
            - name: list-animal-breeds
              method: GET
              description: "Retrieve all animal breed reference values"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-animal-species
              method: GET
              description: "Retrieve all animal species reference values"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-animal-colors
              method: GET
              description: "Retrieve all animal color reference values"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-animal-patterns
              method: GET
              description: "Retrieve all animal pattern reference values"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: pet-lists
          path: /public/petlists
          description: "Organization pet lists"
          operations:
            - name: get-pet-list
              method: GET
              description: "Retrieve a pet list by its keystring"
              inputParameters:
                - name: keystring
                  in: path
                  type: string
                  required: true
                  description: "The pet list keystring identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: rescuegroups-rest
      resources:
        - path: /v1/animals
          name: animals
          description: "Adoptable animals"
          operations:
            - method: GET
              name: list-animals
              description: "List public adoptable animals"
              call: "rescuegroups.list-public-animals"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/animals/{id}
          name: animal
          description: "Single animal record"
          operations:
            - method: GET
              name: get-animal
              description: "Get a single adoptable animal"
              call: "rescuegroups.get-public-animal"
              with:
                animal_id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/animals/search
          name: animal-search
          description: "Search animals"
          operations:
            - method: POST
              name: search-animals
              description: "Search adoptable animals with filters and geodistance"
              call: "rescuegroups.search-public-animals"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/organizations
          name: organizations
          description: "Rescue organizations"
          operations:
            - method: GET
              name: list-organizations
              description: "List public rescue organizations"
              call: "rescuegroups.list-public-orgs"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/organizations/{id}
          name: organization
          description: "Single organization record"
          operations:
            - method: GET
              name: get-organization
              description: "Get a single rescue organization"
              call: "rescuegroups.get-public-org"
              with:
                org_id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/breeds
          name: breeds
          description: "Animal breed reference data"
          operations:
            - method: GET
              name: list-breeds
              description: "List all animal breeds"
              call: "rescuegroups.list-animal-breeds"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/species
          name: species
          description: "Animal species reference data"
          operations:
            - method: GET
              name: list-species
              description: "List all animal species"
              call: "rescuegroups.list-animal-species"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: rescuegroups-mcp
      transport: http
      tools:
        - name: list-animals
          description: "List public adoptable animals with optional pagination"
          hints:
            readOnly: true
            openWorld: true
          call: "rescuegroups.list-public-animals"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-animal
          description: "Get a single adoptable animal by ID"
          hints:
            readOnly: true
            openWorld: true
          call: "rescuegroups.get-public-animal"
          with:
            animal_id: "tools.animal_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-animals
          description: "Search adoptable animals using filters, views, and geodistance"
          hints:
            readOnly: true
            openWorld: true
          call: "rescuegroups.search-public-animals"
          with:
            view_name: "tools.view_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-organizations
          description: "List public rescue organizations"
          hints:
            readOnly: true
            openWorld: true
          call: "rescuegroups.list-public-orgs"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-organization
          description: "Get a single rescue organization by ID"
          hints:
            readOnly: true
            openWorld: true
          call: "rescuegroups.get-public-org"
          with:
            org_id: "tools.org_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-breeds
          description: "List all animal breeds for reference"
          hints:
            readOnly: true
            openWorld: false
          call: "rescuegroups.list-animal-breeds"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-species
          description: "List all animal species for reference"
          hints:
            readOnly: true
            openWorld: false
          call: "rescuegroups.list-animal-species"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-colors
          description: "List all animal colors for reference"
          hints:
            readOnly: true
            openWorld: false
          call: "rescuegroups.list-animal-colors"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-patterns
          description: "List all animal coat patterns for reference"
          hints:
            readOnly: true
            openWorld: false
          call: "rescuegroups.list-animal-patterns"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-pet-list
          description: "Get a pet list by its keystring"
          hints:
            readOnly: true
            openWorld: true
          call: "rescuegroups.get-pet-list"
          with:
            keystring: "tools.keystring"
          outputParameters:
            - type: object
              mapping: "$."
