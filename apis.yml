aid: rescuegroups-org
name: RescueGroups.org
description: >-
  RescueGroups.org provides the only updatable HTTP/JSON API for adoptable pet
  data, offering comprehensive search across animals, organizations, breeds,
  species, colors, and patterns with geodistance filtering. The API supports
  both public read-only access via API key and authenticated write access via
  bearer token, enabling rescue organizations to manage and share pet adoption
  data in real time.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Animals
  - Pet Adoption
  - Rescue
  - Animal Welfare
url: >-
