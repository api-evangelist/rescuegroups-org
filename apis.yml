apis:
  - aid: rescuegroups-org:rescuegroups-org
    name: RescueGroups.org API
    description: >-
      The RescueGroups.org REST API v5 provides access to adoptable pet data
      including animals, organizations, breeds, species, colors, and patterns.
      It supports advanced search with geodistance filtering, pagination, and
      relationship inclusion. API key authorization is used for public data
      access; bearer token authorization is used for private/write operations.
    humanURL: https://rescuegroups.org/services/adoptable-pet-data-api/
    baseURL: https://api.rescuegroups.org/v5
